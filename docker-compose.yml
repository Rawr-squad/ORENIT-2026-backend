version: '3.9'

services:
  db:
    image: postgres:15
    container_name: db
    env_file:
      - .env
    environment:
      - POSTGRES_DB=edu  # База создастся автоматически при старте
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d edu"]
      interval: 5s
      retries: 10
      timeout: 5s
      start_period: 10s

  backend:
    build: .
    container_name: backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: >
      sh -c "
        echo 'Waiting for Postgres...';
        sleep 3;
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

volumes:
  postgres_data: