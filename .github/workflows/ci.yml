name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres  # Сначала создаем стандартную БД
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/edu
      SECRET: testsecret

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Add db to hosts
        run: |
          echo "127.0.0.1 db" | sudo tee -a /etc/hosts
          ping -c 1 db

      - name: Wait for PostgreSQL
        run: |
          for i in {1..10}; do
            if pg_isready -U postgres -h localhost -p 5432; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... $i"
            sleep 5
          done

      - name: Create edu database
        run: |
          # Создаем базу данных edu
          PGPASSWORD=postgres psql -U postgres -h localhost -c "CREATE DATABASE edu;"
          # Проверяем, что база создана
          PGPASSWORD=postgres psql -U postgres -h localhost -c "\l" | grep edu

      - name: Create .env file
        run: |
          cat << EOF > .env
          DATABASE_URL=$DATABASE_URL
          SECRET=$SECRET
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=edu
          EOF
          cat .env

      - name: Initialize alembic if needed
        run: |
          if [ ! -d "alembic" ] && [ ! -d "migrations" ]; then
            alembic init migrations
          fi

      - name: Run migrations
        run: alembic upgrade head